name: CI

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:

jobs:
  ci:
    name: typecheck / lint / test / build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage
      - run: npm run build
