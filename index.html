<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breakout Engine</title>
    <meta
      name="description"
      content="A small, dependency-light HTML5 Canvas breakout game engine with customizable assets."
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>Breakout Engine</h1>
      <div class="breakout-stage">
        <canvas data-breakout-canvas width="320" height="480" aria-label="Breakout game"></canvas>
      </div>
      <p class="breakout-hint">
        Edit <code>config.js</code> to customize difficulty, language, mascot comments, and rewards.
        Replace files under <code>assets/</code> to swap the mascot and reward art.
      </p>
    </main>
    <!-- Runtime config: plain JS, no build step. Loaded before the bundle. -->
    <script src="./config.js"></script>
    <script type="module" src="./dist/bundle.js"></script>
  </body>
</html>
